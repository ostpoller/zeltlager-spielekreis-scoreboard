<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Spielekreis Rangliste</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0f1b2d;
    --surface:   #1a2e46;
    --surface2:  #22395a;
    --accent:    #e8c422;
    --accent2:   #e03030;
    --accent3:   #3aab5c;
    --text:      #e8f0fe;
    --muted:     #7a9cc8;
    --radius:    14px;
    --gold:      #f7c948;
    --silver:    #c0c8d8;
    --bronze:    #cd8256;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 16px 0 20px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 4vw, 3rem);
    color: var(--accent);
    letter-spacing: 1px;
    text-shadow: 0 0 30px rgba(247,201,72,.35);
  }
  header p {
    color: var(--muted);
    font-size: .9rem;
    margin-top: 4px;
  }

  /* ── ADD-ROUND COLUMN ── */
  .add-round-col {
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
  }
  .btn-add-round {
    background: none;
    border: 2px dashed var(--accent3);
    color: var(--accent3);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 1.8rem;
    font-weight: 300;
    line-height: 1;
    width: 44px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .18s;
    writing-mode: vertical-rl;
    padding: 0;
  }
  .btn-add-round:hover {
    background: rgba(58,171,92,.12);
    border-style: solid;
    color: #fff;
  }

  /* ── ALL-ROUNDS COLUMNS ── */
  .rounds-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .round-col {
    flex: 1 1 0;
    min-width: 260px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── COLLAPSIBLE ENTRY PANEL ── */
  .entry-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: none;
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: .9rem;
    padding: 10px 14px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background .15s;
  }
  .entry-toggle:hover { background: #2a4570; }
  .entry-toggle .toggle-arrow {
    margin-left: auto;
    font-size: .75rem;
    color: var(--muted);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .entry-toggle.open .toggle-arrow { transform: rotate(180deg); }

  .entry-panel {
    overflow: hidden;
    max-height: 0;
    transition: max-height .3s ease, opacity .2s ease;
    opacity: 0;
  }
  .entry-panel.open {
    max-height: 9999px;
    opacity: 1;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
  }
  .card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── ENTRY FORM ── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 80px auto;
    gap: 6px;
    margin-bottom: 8px;
    align-items: center;
  }
  .form-row input {
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .88rem;
    padding: 7px 10px;
    width: 100%;
    transition: border-color .15s;
  }
  .form-row input:focus { outline: none; border-color: var(--accent); }
  .form-row input::placeholder { color: var(--muted); }

  .remove-row {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 3px 5px;
    border-radius: 6px;
    transition: background .15s;
    line-height: 1;
  }
  .remove-row:hover { background: rgba(255,107,107,.15); }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    padding: 10px 20px;
    font-size: .9rem;
    transition: filter .15s, transform .1s;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn:active { transform: scale(.97); }
  .btn-accent  { background: var(--accent);  color: #0f1b2d; }
  .btn-teal    { background: var(--accent3); color: #0f1b2d; }
  .btn-danger  { background: var(--accent2); color: #fff; }
  .btn-ghost   { background: var(--surface2); color: var(--text); }
  .btn-sm      { padding: 6px 12px; font-size: .8rem; }

  .form-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  /* ── TOP-N CONTROL ── */
  .topn-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: .85rem;
    color: var(--muted);
  }
  .topn-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .topn-val {
    font-weight: 800;
    color: var(--accent);
    min-width: 24px;
    text-align: center;
  }

  /* ── LEADERBOARD ROWS ── */
  .lb-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--surface2);
  }
  .lb-row:last-child { border-bottom: none; }

  .rank {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    text-align: center;
  }
  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: var(--silver); }
  .rank.r3 { color: var(--bronze); }
  .rank.rn { color: var(--muted); font-size: .9rem; }

  .player-name {
    font-weight: 700;
    font-size: .95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .score-pill {
    background: var(--surface2);
    border-radius: 999px;
    padding: 3px 12px;
    font-weight: 800;
    font-size: .9rem;
    color: var(--accent);
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 20px 0;
    font-size: .88rem;
  }

  /* ── OVERALL SECTION ── */
  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--accent3);
    margin: 32px 0 16px;
    text-align: center;
    letter-spacing: .5px;
  }

  /* ── ROUND NAME INPUT ── */
  .round-name-input {
    background: none;
    border: none;
    border-bottom: 2px solid var(--surface2);
    color: var(--accent);
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    width: 150px;
    padding: 1px 4px;
    transition: border-color .15s;
    flex-shrink: 1;
    min-width: 60px;
  }
  .round-name-input:focus { outline: none; border-color: var(--accent); }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 480px;
    position: relative;
  }
  .modal h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .modal input {
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 9px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    padding: 10px 14px;
    width: 100%;
    margin-bottom: 16px;
    transition: border-color .15s;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ── DANGER ZONE ── */
  .danger-zone {
    margin-top: 32px;
    padding: 16px 20px;
    background: rgba(255,107,107,.06);
    border: 1px solid rgba(255,107,107,.2);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .danger-zone p { color: var(--muted); font-size: .88rem; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── SPLIT LEADERBOARD ── */
  .lb-top3 { }
  .lb-top3 .lb-row { border-bottom: 1px solid var(--surface2); }

  .lb-top3 .lb-row:last-child {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 10px;
    margin-bottom: 2px;
  }

  .lb-scroll-wrap {
    overflow: hidden;
    position: relative;
    /* height set by JS based on row count */
  }
  .lb-scroll-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 32px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }
  .lb-scroll-inner {
    will-change: transform;
  }

</style>

<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1b2d">

  const manifest = {
    name: "Spielekreis Rangliste",
    short_name: "Rangliste",
    display: "fullscreen",
    background_color: "#0f1b2d",
    theme_color: "#0f1b2d",
    start_url: "."
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
</script>
