<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Spielekreis Rangliste</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0f1b2d;
    --surface:   #1a2e46;
    --surface2:  #22395a;
    --accent:    #e8c422;
    --accent2:   #e03030;
    --accent3:   #3aab5c;
    --text:      #e8f0fe;
    --muted:     #7a9cc8;
    --radius:    14px;
    --gold:      #f7c948;
    --silver:    #c0c8d8;
    --bronze:    #cd8256;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    margin: 0;
    padding: 0;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR & NAVIGATION LAYER ── */
  .sidebar {
    width: 100px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 8px;
    border-right: 2px solid var(--surface2);
    box-shadow: 4px 0 24px rgba(0,0,0,.35);
    flex-shrink: 0;
  }

  .sidebar-tabs {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    overflow-y: auto;
    flex: 1;
  }

  .tab-btn {
    background: var(--surface2);
    border: 2px solid transparent;
    color: var(--text);
    border-radius: var(--radius);
    padding: 12px 6px;
    font-family: 'Fredoka One', cursive;
    font-size: .85rem;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    width: 100%;
    word-break: break-word;
    line-height: 1.2;
  }

  .tab-btn:hover { background: #2a4570; }
  .tab-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--bg);
  }

  .btn-add-round {
    background: none;
    border: 2px dashed var(--accent3);
    color: var(--accent3);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 1.8rem;
    font-weight: 300;
    width: 100%;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .18s;
    flex-shrink: 0;
  }
  .btn-add-round:hover {
    background: rgba(58,171,92,.12);
    border-style: solid;
    color: #fff;
  }

  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    height: 100%;
    box-sizing: border-box;
  }

  /* ── VIEW LAYOUTS ── */
  .round-page-grid {
    display: grid;
    grid-template-columns: 1.9fr 1.1fr;
    gap: 24px;
    align-items: start;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
  }
  .card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── ENTRY FORM ── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 80px auto;
    gap: 6px;
    margin-bottom: 8px;
    align-items: center;
  }
  .form-row input {
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .88rem;
    padding: 7px 10px;
    width: 100%;
    transition: border-color .15s;
  }
  .form-row input:focus { outline: none; border-color: var(--accent); }
  .form-row input::placeholder { color: var(--muted); }

  .remove-row {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 3px 5px;
    border-radius: 6px;
    transition: background .15s;
    line-height: 1;
  }
  .remove-row:hover { background: rgba(255,107,107,.15); }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    padding: 10px 20px;
    font-size: .9rem;
    transition: filter .15s, transform .1s;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn:active { transform: scale(.97); }
  .btn-accent  { background: var(--accent);  color: #0f1b2d; }
  .btn-teal    { background: var(--accent3); color: #0f1b2d; }
  .btn-danger  { background: var(--accent2); color: #fff; }
  .btn-ghost   { background: var(--surface2); color: var(--text); }
  .btn-sm      { padding: 6px 12px; font-size: .8rem; }

  .form-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  /* ── LEADERBOARD ROWS ── */
  .lb-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--surface2);
  }
  .lb-row:last-child { border-bottom: none; }

  .rank {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    text-align: center;
  }
  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: var(--silver); }
  .rank.r3 { color: var(--bronze); }
  .rank.rn { color: var(--muted); font-size: .9rem; }

  .player-name {
    font-weight: 700;
    font-size: .95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .score-pill {
    background: var(--surface2);
    border-radius: 999px;
    padding: 3px 12px;
    font-weight: 800;
    font-size: .9rem;
    color: var(--accent);
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 20px 0;
    font-size: .88rem;
  }

  /* ── OVERALL SECTION ── */
  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--accent3);
    margin: 0 0 16px;
    text-align: center;
    letter-spacing: .5px;
  }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 480px;
  }

  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── SPLIT LEADERBOARD ── */
  .lb-top3 .lb-row:last-child {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 10px;
    margin-bottom: 2px;
  }

  .lb-scroll-wrap {
    overflow: hidden;
    position: relative;
  }
  .lb-scroll-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 32px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }
  .lb-scroll-inner {
    will-change: transform;
  }

  /* ── SIDEBAR MENU BUTTON & DROPDOWN ── */
  .menu-btn {
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.4rem;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, color .15s;
    line-height: 1;
    margin-top: 16px;
    flex-shrink: 0;
  }
  .menu-btn:hover { background: var(--surface); color: var(--text); }

  .menu-dropdown {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 110px;
    z-index: 200;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    padding: 8px;
    min-width: 210px;
    flex-direction: column;
    gap: 4px;
  }
  .menu-dropdown.open { display: flex; }

  .menu-item {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: .92rem;
    padding: 10px 14px;
    border-radius: 9px;
    cursor: pointer;
    text-align: left;
    transition: background .12s;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .menu-item:hover { background: var(--surface2); }
  .menu-item.danger { color: var(--accent2); }
  .menu-item label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .menu-divider {
    height: 1px;
    background: var(--surface2);
    margin: 4px 0;
  }
</style>

<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1b2d">
<script>
  const manifest = {
    name: "Spielekreis Rangliste",
    short_name: "Rangliste",
    display: "fullscreen",
    background_color: "#0f1b2d",
    theme_color: "#0f1b2d",
    start_url: "."
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
</script>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-tabs" id="sidebar-tabs"></div>
  <button class="menu-btn" onclick="toggleMenu()" title="Menü">⋮</button>
</div>

<div class="menu-dropdown" id="menu-dropdown">
  <button class="menu-item" onclick="exportJSON();closeMenu()">⬇ <span>Export JSON</span></button>
  <button class="menu-item" onclick="document.getElementById('import-file').click()">
    ⬆ <span>Import JSON</span>
    <input type="file" id="import-file" accept=".json" onchange="importJSON(event)" style="display:none">
  </button>
  <div class="menu-divider"></div>
  <button class="menu-item danger" onclick="clearAll();closeMenu()">✕ <span>Alles zurücksetzen</span></button>
</div>

<div class="main-content" id="main-content"></div>

<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <h3>➕ Neue Runde</h3>
    <input type="text" id="new-round-name" placeholder="Rundenname, z.B. Runde 1" maxlength="40">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="confirmAddRound()">Runde hinzufügen</button>
    </div>
  </div>
</div>

<script>
// ── HELPERS ───────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DATA LAYER ────────────────────────────────────────────────
const STORE_KEY = 'gc_scoreboard_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { rounds: [] }; }
  catch { return { rounds: [] }; }
}

function save(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

// ── STATE ─────────────────────────────────────────────────────
let data = load();
let activeTab = data.rounds.length > 0 ? 0 : 'overall';

// ── RENDER ROUTER ─────────────────────────────────────────────
function render() {
  renderSidebar();
  renderMainContent();
}

function renderSidebar() {
  const tabsContainer = document.getElementById('sidebar-tabs');
  let html = '';

  data.rounds.forEach((round, ri) => {
    const activeClass = activeTab === ri ? 'active' : '';
    html += `<button class="tab-btn ${activeClass}" onclick="switchTab(${ri})">${esc(round.name)}</button>`;
  });

  // + Button is placed above the Total Score Tab
  html += `<button class="btn-add-round" onclick="openModal()" title="Runde hinzufügen">+</button>`;

  if (data.rounds.length > 1) {
    const activeClass = activeTab === 'overall' ? 'active' : '';
    html += `<button class="tab-btn ${activeClass}" onclick="switchTab('overall')" style="margin-top: 10px;">🏆 Gesamt</button>`;
  }

  tabsContainer.innerHTML = html;
}

function switchTab(tab) {
  activeTab = tab;
  render();
  startScrollers();
}

function renderMainContent() {
  const container = document.getElementById('main-content');

  if (data.rounds.length === 0) {
    container.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center;">
        <h2 style="font-family:'Fredoka One', cursive; color:var(--accent); margin-bottom:16px;">Willkommen zur Spielekreis Rangliste!</h2>
        <p style="color:var(--muted); margin-bottom:24px;">Füge deine erste Runde hinzu, um zu starten.</p>
        <button class="btn btn-accent" onclick="openModal()" style="padding:12px 24px; font-size:1.1rem;">+ Erste Runde erstellen</button>
      </div>`;
    return;
  }

  if (activeTab === 'overall') {
    container.innerHTML = `
      <div class="section-title">🏆 Gesamtrangliste</div>
      <div style="max-width:540px; margin:0 auto">
        <div class="card">
          <div id="overall-lb"></div>
        </div>
      </div>`;
    renderOverallLB();
  } else {
    const ri = activeTab;
    if (ri >= data.rounds.length) {
      activeTab = data.rounds.length > 0 ? 0 : 'overall';
      renderMainContent();
      return;
    }
    const round = data.rounds[ri];
    container.innerHTML = buildRoundPageHtml(round, ri);
  }
}

function buildRoundPageHtml(round, ri) {
  const rowsHtml = round.entries.map((e, i) => `
    <div class="form-row">
      <input type="text" placeholder="Spielername" value="${esc(e.name)}"
        oninput="updateEntry(${ri},${i},'name',this.value)">
      <input type="number" placeholder="Punkte" value="${e.score === '' ? '' : e.score}" min="0"
        oninput="updateEntry(${ri},${i},'score',this.value)">
      <button class="remove-row" title="Entfernen" onclick="removeEntry(${ri},${i})">✕</button>
    </div>
  `).join('');

  return `
    <div class="round-page-grid">
      <div class="card">
        <div id="lb-${ri}">${buildLB(round.entries, "r"+ri)}</div>
      </div>

      <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
          <h2 style="margin-bottom:0; display:flex; align-items:center; gap:8px;">
            ${esc(round.name)}
            <button class="btn btn-ghost btn-sm" onclick="renameRoundPrompt(${ri})" title="Runde umbenennen" style="padding: 4px 8px; font-size: 0.8rem;">✏️</button>
          </h2>
          <button class="btn btn-danger btn-sm" onclick="deleteRound(${ri})">Runde Löschen</button>
        </div>
        <div class="form-actions" style="margin-top:0; margin-bottom:16px;">
          <button class="btn btn-teal btn-sm" style="width:100%" onclick="addPlayerRow(${ri})">+ Spieler hinzufügen</button>
        </div>
        <div style="max-height: calc(100vh - 160px); overflow-y: auto; padding-right: 2px;">
          ${rowsHtml}
        </div>
      </div>
    </div>`;
}

// ── ENGINE OPERATIONS ─────────────────────────────────────────
function addPlayerRow(ri) {
  data.rounds[ri].entries.unshift({ name: '', score: '' });
  save(data);
  renderMainContent();
  setTimeout(() => {
    const container = document.getElementById('main-content');
    if (!container) return;
    const inputs = container.querySelectorAll('.form-row input[type=text]');
    if (inputs.length) inputs[0].focus();
  }, 50);
}

function removeEntry(ri, i) {
  const playerName = data.rounds[ri].entries[i].name.trim() || 'Diesen leeren Eintrag';
  if (!confirm(`Möchtest du "${playerName}" wirklich entfernen?`)) return;
  
  data.rounds[ri].entries.splice(i, 1);
  save(data);
  renderMainContent();
  startScrollers();
}

function updateEntry(ri, ei, field, val) {
  data.rounds[ri].entries[ei][field] = val;
  save(data);
  const round = data.rounds[ri];
  
  const lb = document.getElementById(`lb-${ri}`);
  if (lb) lb.innerHTML = buildLB(round.entries, "r"+ri);
  startScrollers();
}

function renameRoundPrompt(ri) {
  const currentName = data.rounds[ri].name;
  const newName = prompt('Runde umbenennen:', currentName);
  if (newName !== null && newName.trim() !== '') {
    data.rounds[ri].name = newName.trim();
    save(data);
    render();
    startScrollers();
  }
}

function renderOverallLB() {
  const totals = {};
  data.rounds.forEach(r => {
    r.entries.forEach(e => {
      const n = e.name.trim();
      if (!n) return;
      const s = parseFloat(e.score) || 0;
      totals[n] = (totals[n] || 0) + s;
    });
  });

  const entries = Object.entries(totals).map(([name, score]) => ({ name, score }));
  const lbBox = document.getElementById('overall-lb');
  if (lbBox) lbBox.innerHTML = buildLB(entries, 'overall');
  startScrollers();
}

function buildLB(entries, lbId) {
  const valid = entries
    .filter(e => e.name.trim() && e.score !== '' && e.score !== null)
    .map(e => ({ name: e.name.trim(), score: parseFloat(e.score) || 0 }))
    .sort((a, b) => b.score - a.score);

  if (!valid.length) return '<div class="empty-state">Noch keine Punkte eingetragen.</div>';

  const top3  = valid.slice(0, 3);
  const rest  = valid.slice(3);
  const top3Html = `<div class="lb-top3">${top3.map((e,i) => rowHtml(e,i)).join('')}</div>`;

  if (!rest.length) return top3Html;

  const scrollId = lbId ? `scroll-${lbId}` : `scroll-${Math.random().toString(36).slice(2)}`;
  const restHtml = rest.map((e,i) => rowHtml(e, i+3)).join('');
  const innerHtml = restHtml + restHtml;

  return top3Html + `<div class="lb-scroll-wrap" id="wrap-${scrollId}">
    <div class="lb-scroll-inner" id="${scrollId}">${innerHtml}</div>
  </div>`;
}

function rowHtml(e, i) {
  const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
  const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
  return `<div class="lb-row">
    <div class="rank ${rankClass}">${medal}</div>
    <div class="player-name">${esc(e.name)}</div>
    <div class="score-pill">${e.score}</div>
  </div>`;
}

function deleteRound(ri) {
  if (!confirm(`Runde "${data.rounds[ri].name}" löschen? Dies kann nicht rückgängig gemacht werden.`)) return;
  data.rounds.splice(ri, 1);
  save(data);
  activeTab = data.rounds.length > 0 ? 0 : 'overall';
  render();
  startScrollers();
}

// ── BACKUP DATA PORTABILITY ───────────────────────────────────
function exportJSON() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href     = url;
  a.download = `zeltlager-rangliste-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.rounds || !Array.isArray(imported.rounds)) {
        alert('Ungültige Datei – keine gültigen Rundendaten gefunden.');
        return;
      }
      if (!confirm(`${imported.rounds.length} Runde(n) importieren? Bestehende Daten werden überschrieben.`)) return;
      data = imported;
      save(data);
      activeTab = data.rounds.length > 0 ? 0 : 'overall';
      render();
      startScrollers();
    } catch {
      alert('Fehler beim Lesen der Datei. Bitte eine gültige JSON-Datei wählen.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAll() {
  if (!confirm('Alle Runden und Punkte werden gelöscht. Bist du sicher?')) return;
  data = { rounds: [] };
  save(data);
  activeTab = 'overall';
  render();
  startScrollers();
}

// ── MODAL MANAGEMENT ──────────────────────────────────────────
function openModal() {
  document.getElementById('new-round-name').value = `Runde ${data.rounds.length + 1}`;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-round-name').select(), 50);
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function confirmAddRound() {
  const name = document.getElementById('new-round-name').value.trim() || `Runde ${data.rounds.length + 1}`;
  data.rounds.push({ name, entries: [] });
  save(data);
  activeTab = data.rounds.length - 1;
  closeModal();
  render();
  startScrollers();
}

document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('new-round-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddRound();
  if (e.key === 'Escape') closeModal();
});

// ── AUTO-ANIMATED SCROLLER ENGINE ─────────────────────────────
const scrollers = {};
const SCROLL_SPEED = 0.4;
const ROW_PAUSE_MS = 1200;

function startScrollers() {
  Object.values(scrollers).forEach(s => cancelAnimationFrame(s.raf));
  for (const k in scrollers) delete scrollers[k];

  document.querySelectorAll('.lb-scroll-inner').forEach(inner => {
    const id = inner.id;
    const wrap = inner.parentElement;
    const halfH = inner.scrollHeight / 2;
    wrap.style.height = Math.min(halfH, 10 * 37) + 'px';

    if (halfH <= 0) return;

    let pos = 0;
    let pauseUntil = 0;

    function tick(ts) {
      if (ts < pauseUntil) {
        scrollers[id].raf = requestAnimationFrame(tick);
        return;
      }
      pos += SCROLL_SPEED;
      if (pos >= halfH) {
        pos = 0;
        pauseUntil = ts + ROW_PAUSE_MS;
      }
      inner.style.transform = `translateY(${-pos}px)`;
      scrollers[id].raf = requestAnimationFrame(tick);
    }
    scrollers[id] = { raf: requestAnimationFrame(tick) };
  });
}

// ── CONTEXT MENU CONTROLS ──
function toggleMenu() {
  document.getElementById('menu-dropdown').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('menu-dropdown').classList.remove('open');
}
document.addEventListener('click', e => {
  const menu = document.getElementById('menu-dropdown');
  const btn  = document.querySelector('.menu-btn');
  if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) closeMenu();
});

// ── CORE INITIALIZATION ───────────────────────────────────────
render();
startScrollers();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
</script>
