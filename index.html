<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Spielekreis Rangliste</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0f1b2d;
    --surface:   #1a2e46;
    --surface2:  #22395a;
    --accent:    #e8c422;
    --accent2:   #e03030;
    --accent3:   #3aab5c;
    --text:      #e8f0fe;
    --muted:     #7a9cc8;
    --radius:    14px;
    --gold:      #f7c948;
    --silver:    #c0c8d8;
    --bronze:    #cd8256;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 16px 0 20px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 4vw, 3rem);
    color: var(--accent);
    letter-spacing: 1px;
    text-shadow: 0 0 30px rgba(247,201,72,.35);
  }
  header p {
    color: var(--muted);
    font-size: .9rem;
    margin-top: 4px;
  }

  /* ── ADD-ROUND COLUMN ── */
  .add-round-col {
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
  }
  .btn-add-round {
    background: none;
    border: 2px dashed var(--accent3);
    color: var(--accent3);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 1.8rem;
    font-weight: 300;
    line-height: 1;
    width: 44px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .18s;
    writing-mode: vertical-rl;
    padding: 0;
  }
  .btn-add-round:hover {
    background: rgba(58,171,92,.12);
    border-style: solid;
    color: #fff;
  }

  /* ── ALL-ROUNDS COLUMNS ── */
  .rounds-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .round-col {
    flex: 1 1 0;
    min-width: 260px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── COLLAPSIBLE ENTRY PANEL ── */
  .entry-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: none;
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: .9rem;
    padding: 10px 14px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background .15s;
  }
  .entry-toggle:hover { background: #2a4570; }
  .entry-toggle .toggle-arrow {
    margin-left: auto;
    font-size: .75rem;
    color: var(--muted);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .entry-toggle.open .toggle-arrow { transform: rotate(180deg); }

  .entry-panel {
    overflow: hidden;
    max-height: 0;
    transition: max-height .3s ease, opacity .2s ease;
    opacity: 0;
  }
  .entry-panel.open {
    max-height: 9999px;
    opacity: 1;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
  }
  .card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── ENTRY FORM ── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 80px auto;
    gap: 6px;
    margin-bottom: 8px;
    align-items: center;
  }
  .form-row input {
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .88rem;
    padding: 7px 10px;
    width: 100%;
    transition: border-color .15s;
  }
  .form-row input:focus { outline: none; border-color: var(--accent); }
  .form-row input::placeholder { color: var(--muted); }

  .remove-row {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 3px 5px;
    border-radius: 6px;
    transition: background .15s;
    line-height: 1;
  }
  .remove-row:hover { background: rgba(255,107,107,.15); }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    padding: 10px 20px;
    font-size: .9rem;
    transition: filter .15s, transform .1s;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn:active { transform: scale(.97); }
  .btn-accent  { background: var(--accent);  color: #0f1b2d; }
  .btn-teal    { background: var(--accent3); color: #0f1b2d; }
  .btn-danger  { background: var(--accent2); color: #fff; }
  .btn-ghost   { background: var(--surface2); color: var(--text); }
  .btn-sm      { padding: 6px 12px; font-size: .8rem; }

  .form-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  /* ── TOP-N CONTROL ── */
  .topn-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: .85rem;
    color: var(--muted);
  }
  .topn-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .topn-val {
    font-weight: 800;
    color: var(--accent);
    min-width: 24px;
    text-align: center;
  }

  /* ── LEADERBOARD ROWS ── */
  .lb-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--surface2);
  }
  .lb-row:last-child { border-bottom: none; }

  .rank {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    text-align: center;
  }
  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: var(--silver); }
  .rank.r3 { color: var(--bronze); }
  .rank.rn { color: var(--muted); font-size: .9rem; }

  .player-name {
    font-weight: 700;
    font-size: .95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .score-pill {
    background: var(--surface2);
    border-radius: 999px;
    padding: 3px 12px;
    font-weight: 800;
    font-size: .9rem;
    color: var(--accent);
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 20px 0;
    font-size: .88rem;
  }

  /* ── OVERALL SECTION ── */
  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--accent3);
    margin: 32px 0 16px;
    text-align: center;
    letter-spacing: .5px;
  }

  /* ── ROUND NAME INPUT ── */
  .round-name-input {
    background: none;
    border: none;
    border-bottom: 2px solid var(--surface2);
    color: var(--accent);
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    width: 150px;
    padding: 1px 4px;
    transition: border-color .15s;
    flex-shrink: 1;
    min-width: 60px;
  }
  .round-name-input:focus { outline: none; border-color: var(--accent); }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 480px;
    position: relative;
  }
  .modal h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .modal input {
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 9px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    padding: 10px 14px;
    width: 100%;
    margin-bottom: 16px;
    transition: border-color .15s;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ── DANGER ZONE ── */
  .danger-zone {
    margin-top: 32px;
    padding: 16px 20px;
    background: rgba(255,107,107,.06);
    border: 1px solid rgba(255,107,107,.2);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .danger-zone p { color: var(--muted); font-size: .88rem; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── SPLIT LEADERBOARD ── */
  .lb-top3 { }
  .lb-top3 .lb-row { border-bottom: 1px solid var(--surface2); }

  .lb-top3 .lb-row:last-child {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 10px;
    margin-bottom: 2px;
  }

  .lb-scroll-wrap {
    overflow: hidden;
    position: relative;
    /* height set by JS based on row count */
  }
  .lb-scroll-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 32px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }
  .lb-scroll-inner {
    will-change: transform;
  }

</style>

<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1b2d">

  const manifest = {
    name: "Spielekreis Rangliste",
    short_name: "Rangliste",
    display: "fullscreen",
    background_color: "#0f1b2d",
    theme_color: "#0f1b2d",
    start_url: "."
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
</script>

                background:#fff;padding:6px;
                box-shadow:0 4px 24px rgba(0,0,0,.45);">
    <div style="text-align:left">
      <div style="font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,3.5vw,2.4rem);
                  color:var(--accent);text-shadow:0 0 24px rgba(232,196,34,.35);
                  line-height:1.15">
        Spielekreis Rangliste
      </div>
      <div style="color:var(--muted);font-size:.9rem;margin-top:4px">
        8 Spiele · 30 Sekunden pro Spiel · Alle Runden im Überblick
      </div>
    </div>
  </div>
</header>


<!-- All rounds side by side -->
<div class="rounds-row" id="rounds-row"></div>

<!-- Overall leaderboard -->
<div id="overall-section" style="display:none">
  <div class="section-title">🏆 Gesamtrangliste</div>
  <div style="max-width:480px;margin:0 auto">
    <div class="card">
      <div class="topn-row">
        Top <input type="range" id="overall-slider" min="1" max="50" value="10">
        <span class="topn-val" id="overall-val">10</span> Spieler anzeigen
      </div>
      <div id="overall-lb"></div>
    </div>
  </div>
</div>

<div class="danger-zone">
  <p>⚠️ Alle Daten löschen – dies kann nicht rückgängig gemacht werden.</p>
  <button class="btn btn-danger btn-sm" onclick="clearAll()">Alles zurücksetzen</button>
</div>

<!-- Add Round Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <h3>➕ Neue Runde</h3>
    <input type="text" id="new-round-name" placeholder="Rundenname, z.B. Runde 1" maxlength="40">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="confirmAddRound()">Runde hinzufügen</button>
    </div>
  </div>
</div>

<script>
// ── DATA LAYER ────────────────────────────────────────────────
const STORE_KEY = 'gc_scoreboard_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { rounds: [] }; }
  catch { return { rounds: [] }; }
}

function save(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

// ── STATE ─────────────────────────────────────────────────────
let data = load();

// ── RENDER ───────────────────────────────────────────────────
function render() {
  renderAllRounds();
  renderOverall();
}

function renderAllRounds() {
  const container = document.getElementById('rounds-row');
  const overall   = document.getElementById('overall-section');

  if (data.rounds.length === 0) {
    const addBtn = `<div class="add-round-col" style="width:100%;justify-content:center;min-height:160px"><button class="btn-add-round" onclick="openModal()" title="Runde hinzufügen" style="width:160px;min-height:80px;writing-mode:horizontal-tb;font-size:2.5rem">+</button></div>`;
    container.innerHTML = addBtn;
    overall.style.display = 'none';
    return;
  }

  const roundsHtml = data.rounds.map((round, ri) => buildRoundCol(round, ri)).join('');
  const addBtn = `<div class="add-round-col"><button class="btn-add-round" id="btn-add-round" onclick="openModal()" title="Runde hinzufügen">+</button></div>`;
  container.innerHTML = roundsHtml + addBtn;
  overall.style.display = data.rounds.length > 1 ? 'block' : 'none';
  if (data.rounds.length > 1) renderOverall();
  requestAnimationFrame(matchAddButtonHeight);
}

function buildRoundCol(round, ri) {
  const entryOpen = round.entryOpen !== false;
  const namedCount = Math.max(round.entries.filter(e => e.name.trim()).length, 1);
  const topN = Math.min(round.topN || 10, namedCount);

  const rowsHtml = round.entries.map((e, i) => `
    <div class="form-row">
      <input type="text" placeholder="Spielername" value="${esc(e.name)}"
        oninput="updateEntry(${ri},${i},'name',this.value)">
      <input type="number" placeholder="Punkte" value="${e.score === '' ? '' : e.score}" min="0"
        oninput="updateEntry(${ri},${i},'score',this.value)">
      <button class="remove-row" title="Entfernen" onclick="removeEntry(${ri},${i})">✕</button>
    </div>
  `).join('');

  return `
    <div class="round-col" id="round-col-${ri}">
      <!-- Collapsible entry toggle -->
      <button class="entry-toggle ${entryOpen ? 'open' : ''}" onclick="toggleEntry(${ri})" id="toggle-${ri}">
        ✏️
        <input class="round-name-input" value="${esc(round.name)}"
          onclick="event.stopPropagation()"
          oninput="renameRound(${ri},this.value)" maxlength="40">
        <span class="toggle-arrow">▼</span>
      </button>

      <!-- Collapsible entry panel -->
      <div class="entry-panel ${entryOpen ? 'open' : ''}" id="panel-${ri}">
        <div class="card" style="border-radius:0 0 var(--radius) var(--radius); margin-top:-4px">
          <div class="form-actions" style="margin-top:0;margin-bottom:12px">
            <button class="btn btn-teal btn-sm" onclick="addEntry(${ri})">+ Spieler</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRound(${ri})">Runde löschen</button>
          </div>
          ${rowsHtml}
        </div>
      </div>

      <!-- Leaderboard — always visible -->
      <div class="card">
        <h2>🥇 ${esc(round.name)}</h2>
        <div class="topn-row">
          Top
          <input type="range" min="1" max="${namedCount}" value="${topN}"
            oninput="setTopN(${ri},+this.value)" id="slider-${ri}">
          <span class="topn-val" id="val-${ri}">${topN}</span>
        </div>
        <div id="lb-${ri}">${buildLB(round.entries, topN, "r"+ri)}</div>
      </div>
    </div>`;
}

function renderOverall() {
  const slider = document.getElementById('overall-slider');
  if (!slider) return;
  const val = +slider.value;
  document.getElementById('overall-val').textContent = val;

  const totals = {};
  data.rounds.forEach(r => {
    r.entries.forEach(e => {
      const n = e.name.trim();
      if (!n) return;
      const s = parseFloat(e.score) || 0;
      totals[n] = (totals[n] || 0) + s;
    });
  });

  const entries = Object.entries(totals).map(([name, score]) => ({ name, score }));
  document.getElementById('overall-lb').innerHTML = buildLB(entries, val, 'overall');
  startScrollers();
}

function rowHtml(e, i) {
  const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
  const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
  return `<div class="lb-row">
    <div class="rank ${rankClass}">${medal}</div>
    <div class="player-name">${esc(e.name)}</div>
    <div class="score-pill">${e.score}</div>
  </div>`;
}

function buildLB(entries, topN, lbId) {
  const valid = entries
    .filter(e => e.name.trim() && e.score !== '' && e.score !== null)
    .map(e => ({ name: e.name.trim(), score: parseFloat(e.score) || 0 }))
    .sort((a, b) => b.score - a.score)
    .slice(0, topN);

  if (!valid.length) return '<div class="empty-state">Noch keine Punkte eingetragen.</div>';

  const top3  = valid.slice(0, 3);
  const rest  = valid.slice(3);

  const top3Html = `<div class="lb-top3">${top3.map((e,i) => rowHtml(e,i)).join('')}</div>`;

  if (!rest.length) return top3Html;

  const scrollId = lbId ? `scroll-${lbId}` : `scroll-${Math.random().toString(36).slice(2)}`;
  const restHtml = rest.map((e,i) => rowHtml(e, i+3)).join('');
  // doubled for seamless loop
  const innerHtml = restHtml + restHtml;

  return top3Html + `<div class="lb-scroll-wrap" id="wrap-${scrollId}">
    <div class="lb-scroll-inner" id="${scrollId}">${innerHtml}</div>
  </div>`;
}

// ── TOGGLE ENTRY PANEL ───────────────────────────────────────
function toggleEntry(ri) {
  data.rounds[ri].entryOpen = !(data.rounds[ri].entryOpen !== false);
  save(data);
  document.getElementById(`toggle-${ri}`).classList.toggle('open', data.rounds[ri].entryOpen);
  document.getElementById(`panel-${ri}`).classList.toggle('open', data.rounds[ri].entryOpen);
}

// ── MUTATIONS ────────────────────────────────────────────────
function addEntry(ri) {
  data.rounds[ri].entries.unshift({ name: '', score: '' });
  save(data); render();
  startScrollers();
  setTimeout(() => {
    const col = document.getElementById(`round-col-${ri}`);
    if (!col) return;
    const inputs = col.querySelectorAll('.form-row input[type=text]');
    if (inputs.length) inputs[0].focus();
  }, 50);
}


function removeEntry(ri, ei) {
  data.rounds[ri].entries.splice(ei, 1);
  save(data); render();
  startScrollers();
}

function updateEntry(ri, ei, field, val) {
  data.rounds[ri].entries[ei][field] = val;
  save(data);
  const round = data.rounds[ri];
  const namedCount = Math.max(round.entries.filter(e => e.name.trim()).length, 1);
  const topN = Math.min(round.topN || 10, namedCount);
  round.topN = topN;
  const slider = document.getElementById(`slider-${ri}`);
  const valEl  = document.getElementById(`val-${ri}`);
  if (slider) { slider.max = namedCount; slider.value = topN; }
  if (valEl)  valEl.textContent = topN;
  const lb = document.getElementById(`lb-${ri}`);
  if (lb) lb.innerHTML = buildLB(round.entries, topN, "r"+ri);
  startScrollers();
  if (data.rounds.length > 1) renderOverall();
}

function renameRound(ri, val) {
  data.rounds[ri].name = val;
  save(data);
}

function setTopN(ri, n) {
  data.rounds[ri].topN = n;
  save(data);
  document.getElementById(`val-${ri}`).textContent = n;
  document.getElementById(`lb-${ri}`).innerHTML = buildLB(data.rounds[ri].entries, n, 'r'+ri);
  startScrollers();
}

function deleteRound(ri) {
  if (!confirm(`Runde "${data.rounds[ri].name}" löschen? Dies kann nicht rückgängig gemacht werden.`)) return;
  data.rounds.splice(ri, 1);
  save(data); render();
  startScrollers();
}

function clearAll() {
  if (!confirm('Alle Runden und Punkte werden gelöscht. Bist du sicher?')) return;
  data = { rounds: [] };
  save(data); render();
  startScrollers();
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal() {
  document.getElementById('new-round-name').value = `Runde ${data.rounds.length + 1}`;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-round-name').select(), 50);
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function confirmAddRound() {
  const name = document.getElementById('new-round-name').value.trim() || `Runde ${data.rounds.length + 1}`;
  data.rounds.push({ name, entries: [], topN: 10, entryOpen: true });
  save(data);
  closeModal();
  render();
  startScrollers();
}

document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('new-round-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddRound();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('overall-slider').addEventListener('input', function() {
  document.getElementById('overall-val').textContent = this.value;
  renderOverall();
});

// ── HELPERS ───────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


// ── AUTO-SCROLLER ─────────────────────────────────────────────
const scrollers = {}; // id -> { raf, pos, speed }
const SCROLL_SPEED = 0.4; // px per frame (~24px/s at 60fps)
const ROW_PAUSE_MS = 1200; // pause at top before restarting

function startScrollers() {
  // Stop old ones
  Object.values(scrollers).forEach(s => cancelAnimationFrame(s.raf));
  for (const k in scrollers) delete scrollers[k];

  document.querySelectorAll('.lb-scroll-inner').forEach(inner => {
    const id = inner.id;
    const wrap = inner.parentElement;
    // Height of one copy = half the inner scroll height
    const halfH = inner.scrollHeight / 2;
    // Show ~3 rows in the scroll window
    wrap.style.height = Math.min(halfH, 3 * 37) + 'px';

    if (halfH <= 0) return;

    let pos = 0;
    let pauseUntil = 0;

    function tick(ts) {
      if (ts < pauseUntil) {
        scrollers[id].raf = requestAnimationFrame(tick);
        return;
      }
      pos += SCROLL_SPEED;
      if (pos >= halfH) {
        pos = 0;
        pauseUntil = ts + ROW_PAUSE_MS;
      }
      inner.style.transform = `translateY(${-pos}px)`;
      scrollers[id].raf = requestAnimationFrame(tick);
    }
    scrollers[id] = { raf: requestAnimationFrame(tick) };
  });
}


// ── MATCH ADD-BUTTON HEIGHT TO TALLEST SCOREBOARD ───────────
let _colObserver = null;

function matchAddButtonHeight() {
  const btn = document.getElementById('btn-add-round');
  if (!btn) return;
  const cols = document.querySelectorAll('.round-col');
  if (!cols.length) return;
  const tallest = Math.max(...Array.from(cols).map(c => c.offsetHeight));
  btn.style.minHeight = tallest + 'px';

  // Observe all cols so height updates when entry panel opens/closes or rows change
  if (_colObserver) _colObserver.disconnect();
  _colObserver = new ResizeObserver(() => {
    const b = document.getElementById('btn-add-round');
    if (!b) return;
    const cs = document.querySelectorAll('.round-col');
    if (!cs.length) return;
    const h = Math.max(...Array.from(cs).map(c => c.offsetHeight));
    b.style.minHeight = h + 'px';
  });
  cols.forEach(c => _colObserver.observe(c));
}

// ── INIT ──────────────────────────────────────────────────────
render();
startScrollers();

// ── SERVICE WORKER REGISTRATION ──────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}

</script>
</body>
</html>
